<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>dear pooty...</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&display=swap" rel="stylesheet">

  </head>
  <style>
    body {
      background-image: url(blue\ planets\ edited.jpg);

    p {

    }

    #pootycolor {
      color: rgb(238,133,77);
      font-family: "Rubik Bubbles", system-ui;
      font-weight: 400;
      font-style: normal;
      font-size: 50px;
    }
  </style>
  <body>

    <button id="mem1-button">Memory #1</button>
    <button id="mem2-button">Memory #2</button>

    <h1>My Top 3 Favorite Things About <span id="pootycolor">Pooty</span></h1>
    <ol>
